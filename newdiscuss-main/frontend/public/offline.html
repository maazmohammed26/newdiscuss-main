<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discuss - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: #F8FAFC; color: #0F172A; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .container { text-align: center; max-width: 400px; }
    .icon { width: 64px; height: 64px; background: #F1F5F9; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; }
    .icon svg { width: 32px; height: 32px; color: #64748B; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    p { color: #64748B; font-size: 15px; line-height: 1.6; margin-bottom: 24px; }
    a { display: inline-block; background: #CC0000; color: white; padding: 10px 24px; border-radius: 8px; text-decoration: none; font-weight: 500; }
    a:hover { background: #A30000; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 010 12.728M15.536 8.464a5 5 0 010 7.072M5.636 18.364a9 9 0 010-12.728M8.464 15.536a5 5 0 010-7.072" />
        <line x1="2" y1="2" x2="22" y2="22" stroke="currentColor" stroke-width="2" />
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>It looks like you've lost your internet connection. Don't worry — your cached content is still available.</p>
    <a href="/">Try Again</a>
  </div>
</body>
</html>
